# Increase inotify limits for Kubernetes nodes
# max_user_watches: max file/directory watches per user (default 8192)
# k3s/kubelet creates watches for configmaps, secrets, and pod volumes
fs.inotify.max_user_watches=524288
# max_user_instances: max inotify instances per user (default 128)
# Each service using inotify (kubelet, containerd, systemd) needs at least one
fs.inotify.max_user_instances=1024
